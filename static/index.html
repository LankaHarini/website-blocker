<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FocusGuard — Reclaim Your Attention</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════ RESET & ROOT ═══════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --clr-bg:        #f0f2f7;
  --clr-surface:   #ffffff;
  --clr-primary:   #4361ee;
  --clr-primary-h: #3452d6;
  --clr-primary-l: #eef1fd;
  --clr-danger:    #ef4444;
  --clr-danger-l:  #fef2f2;
  --clr-success:   #22c55e;
  --clr-success-l: #f0fdf4;
  --clr-muted:     #6b7280;
  --clr-border:    #e5e7eb;
  --clr-text:      #1e293b;
  --clr-text-sm:   #64748b;
  --radius:        14px;
  --shadow:        0 2px 12px rgba(30,41,59,.07);
  --shadow-lg:     0 8px 32px rgba(30,41,59,.12);
  --font-head:     'Sora', sans-serif;
  --font-body:     'DM Sans', sans-serif;
  --transition:    .24s cubic-bezier(.4,0,.2,1);
}

html { font-size: 16px; }
body {
  font-family: var(--font-body);
  background: var(--clr-bg);
  color: var(--clr-text);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════ NAVBAR ═════════════════════════════ */
.navbar {
  background: var(--clr-surface);
  border-bottom: 1px solid var(--clr-border);
  padding: 0 32px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.navbar__logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.navbar__icon {
  width: 38px; height: 38px;
  background: var(--clr-primary);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.navbar__icon svg { width: 22px; height: 22px; }
.navbar__text h1 {
  font-family: var(--font-head);
  font-size: .95rem;
  font-weight: 700;
  color: var(--clr-text);
  letter-spacing: -.2px;
}
.navbar__text p {
  font-size: .72rem;
  color: var(--clr-muted);
  margin-top: 1px;
}
.btn-add {
  background: var(--clr-primary);
  color: #fff;
  border: none;
  padding: 10px 22px;
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
  box-shadow: 0 2px 8px rgba(67,97,238,.35);
}
.btn-add:hover {
  background: var(--clr-primary-h);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(67,97,238,.4);
}
.btn-add:active { transform: translateY(0); }

/* ═══════════════════════════════════════ MAIN LAYOUT ════════════════════════ */
.main {
  max-width: 960px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* ═══════════════════════════════════════ HERO / TEST SECTION ════════════════ */
.hero {
  text-align: center;
  margin-bottom: 44px;
}
.hero h2 {
  font-family: var(--font-head);
  font-size: 1.9rem;
  font-weight: 700;
  color: var(--clr-text);
  letter-spacing: -.4px;
  margin-bottom: 6px;
}
.hero p {
  color: var(--clr-muted);
  font-size: .88rem;
  margin-bottom: 24px;
}
.test-bar {
  background: var(--clr-surface);
  border-radius: 18px;
  box-shadow: var(--shadow);
  padding: 10px 10px 10px 22px;
  display: flex;
  align-items: center;
  gap: 12px;
  max-width: 620px;
  margin: 0 auto;
}
.test-bar__icon { color: var(--clr-muted); flex-shrink: 0; }
.test-bar input {
  flex: 1;
  border: none;
  outline: none;
  font-family: var(--font-body);
  font-size: .84rem;
  color: var(--clr-text);
  background: transparent;
}
.test-bar input::placeholder { color: #a3aec5; }
.btn-check {
  background: var(--clr-primary);
  color: #fff;
  border: none;
  padding: 11px 28px;
  border-radius: 12px;
  font-family: var(--font-body);
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-check:hover { background: var(--clr-primary-h); transform: translateY(-1px); }
.btn-check:active { transform: translateY(0); }

/* result toast */
.toast {
  margin-top: 16px;
  padding: 12px 20px;
  border-radius: 12px;
  font-size: .81rem;
  font-weight: 500;
  display: none;
  animation: fadeSlideIn .28s ease;
  max-width: 620px;
  margin-left: auto; margin-right: auto;
  text-align: left;
}
.toast--blocked   { background: var(--clr-danger-l);  color: var(--clr-danger);  border: 1px solid #fecaca; }
.toast--allowed   { background: var(--clr-success-l); color: #166534;            border: 1px solid #bbf7d0; }
.toast--info      { background: var(--clr-primary-l); color: var(--clr-primary);  border: 1px solid #c7d2fe; }

/* ═══════════════════════════════════════ ACTIVE BLOCKS ══════════════════════ */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.section-header__left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-header__left .icon-globe {
  color: var(--clr-primary);
}
.section-header__left h3 {
  font-family: var(--font-head);
  font-size: 1.05rem;
  font-weight: 600;
}
.section-header__right {
  font-size: .78rem;
  color: var(--clr-muted);
  font-weight: 500;
}

/* cards grid */
.blocks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

/* single card */
.block-card {
  background: var(--clr-surface);
  border: 1px solid var(--clr-border);
  border-radius: var(--radius);
  padding: 22px 20px 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: var(--shadow);
  transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
  position: relative;
  overflow: hidden;
}
.block-card:hover {
  border-color: var(--clr-primary);
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}
/* left accent stripe */
.block-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--clr-border);
  border-radius: var(--radius) 0 0 var(--radius);
  transition: background var(--transition);
}
.block-card--active::before { background: var(--clr-danger); }
.block-card--active { border-color: rgba(239,68,68,.18); }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.card-top__domain {
  font-family: var(--font-head);
  font-size: .92rem;
  font-weight: 700;
  color: var(--clr-text);
}
.card-top__time {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: .76rem;
  color: var(--clr-muted);
  margin-top: 4px;
}

/* toggle switch */
.toggle {
  position: relative;
  width: 46px;
  height: 26px;
  flex-shrink: 0;
  cursor: pointer;
}
.toggle input {
  opacity: 0; width: 0; height: 0;
}
.toggle__slider {
  position: absolute;
  inset: 0;
  background: #d1d5db;
  border-radius: 26px;
  transition: background var(--transition);
}
.toggle__slider::before {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  left: 3px; bottom: 3px;
  background: #fff;
  border-radius: 50%;
  transition: transform var(--transition);
  box-shadow: 0 1px 3px rgba(0,0,0,.15);
}
.toggle input:checked + .toggle__slider { background: var(--clr-primary); }
.toggle input:checked + .toggle__slider::before { transform: translateX(20px); }

/* card bottom row */
.card-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.badge {
  font-size: .7rem;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 5px;
  letter-spacing: .2px;
}
.badge--active   { background: var(--clr-danger-l);  color: var(--clr-danger); }
.badge--inactive { background: #f3f4f6;              color: var(--clr-muted); }
.badge__dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}
/* delete btn */
.btn-delete {
  background: none;
  border: none;
  color: #c4c9d4;
  cursor: pointer;
  padding: 4px;
  border-radius: 8px;
  transition: color var(--transition), background var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-delete:hover { color: var(--clr-danger); background: var(--clr-danger-l); }

/* empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--clr-muted);
}
.empty-state svg { width: 56px; height: 56px; opacity: .35; margin-bottom: 14px; }
.empty-state p  { font-size: .84rem; }
.empty-state strong { color: var(--clr-text); }

/* ═══════════════════════════════════════ MODAL ══════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,.45);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .22s ease;
}
.modal-overlay--open { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--clr-surface);
  border-radius: 20px;
  width: 100%;
  max-width: 420px;
  padding: 32px 28px 28px;
  box-shadow: 0 24px 48px rgba(15,23,42,.18);
  transform: translateY(16px) scale(.97);
  transition: transform .26s cubic-bezier(.4,0,.2,1);
}
.modal-overlay--open .modal { transform: translateY(0) scale(1); }

.modal__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.modal__header h3 {
  font-family: var(--font-head);
  font-size: 1.1rem;
  font-weight: 700;
}
.modal__close {
  background: none; border: none;
  color: var(--clr-muted);
  font-size: 1.3rem;
  cursor: pointer;
  width: 30px; height: 30px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--transition), color var(--transition);
}
.modal__close:hover { background: #f3f4f6; color: var(--clr-text); }

.form-group { margin-bottom: 18px; }
.form-group label {
  display: block;
  font-size: .76rem;
  font-weight: 600;
  color: var(--clr-muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 7px;
}
.form-group input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--clr-border);
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: .84rem;
  color: var(--clr-text);
  background: var(--clr-bg);
  transition: border-color var(--transition), box-shadow var(--transition);
  outline: none;
}
.form-group input:focus {
  border-color: var(--clr-primary);
  box-shadow: 0 0 0 3px rgba(67,97,238,.15);
  background: #fff;
}
.form-group input::placeholder { color: #a3aec5; }

.time-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 10px;
  align-items: end;
}
.time-row__sep {
  font-size: .82rem;
  color: var(--clr-muted);
  font-weight: 600;
  text-align: center;
  padding-bottom: 10px;
}

.btn-submit {
  width: 100%;
  background: var(--clr-primary);
  color: #fff;
  border: none;
  padding: 12px;
  border-radius: 12px;
  font-family: var(--font-body);
  font-size: .86rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
  box-shadow: 0 3px 10px rgba(67,97,238,.3);
}
.btn-submit:hover {
  background: var(--clr-primary-h);
  transform: translateY(-1px);
  box-shadow: 0 5px 16px rgba(67,97,238,.38);
}
.btn-submit:active { transform: translateY(0); }

.modal__error {
  color: var(--clr-danger);
  font-size: .75rem;
  margin-top: 10px;
  text-align: center;
  min-height: 18px;
}

/* ═══════════════════════════════════════ ANIMATIONS ═════════════════════════ */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.block-card { animation: cardIn .3s ease both; }

/* ═══════════════════════════════════════ RESPONSIVE ═════════════════════════ */
@media (max-width: 560px) {
  .navbar { padding: 0 16px; }
  .main  { padding: 28px 16px 60px; }
  .hero h2 { font-size: 1.45rem; }
  .test-bar { padding: 8px 8px 8px 16px; flex-wrap: wrap; }
  .test-bar input { min-width: 140px; }
  .blocks-grid { grid-template-columns: 1fr; }
  .modal { margin: 0 12px; padding: 24px 20px 22px; }
}
</style>
</head>
<body>

<!-- ─── NAVBAR ──────────────────────────────────────────────────────────── -->
<nav class="navbar">
  <div class="navbar__logo">
    <div class="navbar__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <div class="navbar__text">
      <h1>FocusGuard</h1>
      <p>Reclaim your attention</p>
    </div>
  </div>
  <button class="btn-add" onclick="openModal()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Block
  </button>
</nav>

<!-- ─── MAIN ────────────────────────────────────────────────────────────── -->
<main class="main">

  <!-- hero / test -->
  <section class="hero">
    <h2>Test your filters</h2>
    <p>Try visiting a blocked site to see FocusGuard in action.</p>
    <div class="test-bar">
      <svg class="test-bar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="testInput" placeholder="Enter a website URL (e.g. facebook.com)…" onkeydown="if(event.key==='Enter') checkAccess()" />
      <button class="btn-check" onclick="checkAccess()">Check Access</button>
    </div>
    <div class="toast" id="toast"></div>
  </section>

  <!-- active blocks -->
  <section>
    <div class="section-header">
      <div class="section-header__left">
        <svg class="icon-globe" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <h3>Active Blocks</h3>
      </div>
      <span class="section-header__right" id="blockCount">0 sites configured</span>
    </div>
    <div class="blocks-grid" id="blocksGrid"></div>
  </section>
</main>

<!-- ─── MODAL ──────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal__header">
      <h3>Block a Website</h3>
      <button class="modal__close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="form-group">
      <label>Website Domain</label>
      <input type="text" id="domainInput" placeholder="e.g. facebook.com" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Block Time Window</label>
      <div class="time-row">
        <div>
          <label style="font-size:.68rem; text-transform:none; letter-spacing:0; color:#9ca3af;">Start</label>
          <input type="time" id="startTime" value="09:00" />
        </div>
        <div class="time-row__sep">→</div>
        <div>
          <label style="font-size:.68rem; text-transform:none; letter-spacing:0; color:#9ca3af;">End</label>
          <input type="time" id="endTime" value="17:00" />
        </div>
      </div>
    </div>
    <button class="btn-submit" onclick="addBlock()">Add Block</button>
    <div class="modal__error" id="modalError"></div>
  </div>
</div>

<!-- ─── SCRIPT ──────────────────────────────────────────────────────────── -->
<script>
// ─── state & fetch helpers ──────────────────────────────────────────────────
async function fetchBlocks() {
  const res = await fetch("/api/blocks");
  return res.json();
}

// ─── render cards ───────────────────────────────────────────────────────────
async function renderBlocks() {
  const blocks = await fetchBlocks();
  const grid  = document.getElementById("blocksGrid");
  const count = document.getElementById("blockCount");
  count.textContent = blocks.length + " site" + (blocks.length !== 1 ? "s" : "") + " configured";

  if (blocks.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <p><strong>No blocks yet.</strong><br/>Click <strong>+ Add Block</strong> to start protecting your focus.</p>
      </div>`;
    return;
  }

  grid.innerHTML = blocks.map((b, i) => {
    const active = b.active_now;
    return `
    <div class="block-card ${active ? "block-card--active" : ""}" style="animation-delay:${i*.06}s">
      <div class="card-top">
        <div>
          <div class="card-top__domain">${escHtml(b.domain)}</div>
          <div class="card-top__time">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${b.start_time} – ${b.end_time}
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" ${b.enabled ? "checked" : ""} onchange="toggleBlock('${escHtml(b.domain)}')"/>
          <span class="toggle__slider"></span>
        </label>
      </div>
      <div class="card-bottom">
        <span class="badge ${active ? "badge--active" : "badge--inactive"}">
          <span class="badge__dot"></span>
          ${active ? "Blocking Active" : "Inactive"}
        </span>
        <button class="btn-delete" onclick="deleteBlock('${escHtml(b.domain)}')" title="Remove block">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </div>`;
  }).join("");
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ─── modal ──────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById("modalOverlay").classList.add("modal-overlay--open");
  document.getElementById("domainInput").value = "";
  document.getElementById("modalError").textContent = "";
  setTimeout(() => document.getElementById("domainInput").focus(), 240);
}
function closeModal() {
  document.getElementById("modalOverlay").classList.remove("modal-overlay--open");
}
function closeModalOutside(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModal();
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ─── add block ──────────────────────────────────────────────────────────────
async function addBlock() {
  const errEl  = document.getElementById("modalError");
  const domain = document.getElementById("domainInput").value.trim();
  const start  = document.getElementById("startTime").value;
  const end    = document.getElementById("endTime").value;

  if (!domain) { errEl.textContent = "Please enter a domain."; return; }

  errEl.textContent = "";
  const res = await fetch("/api/blocks", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ domain, start_time: start, end_time: end })
  });
  const data = await res.json();
  if (res.status >= 400) {
    errEl.textContent = data.error || "Something went wrong.";
    return;
  }
  if (data.warning) {
    errEl.textContent = "⚠️ " + data.warning;
  }
  closeModal();
  renderBlocks();
}

// ─── toggle ─────────────────────────────────────────────────────────────────
async function toggleBlock(domain) {
  await fetch(`/api/blocks/${encodeURIComponent(domain)}/toggle`, { method:"PATCH" });
  renderBlocks();
}

// ─── delete ─────────────────────────────────────────────────────────────────
async function deleteBlock(domain) {
  if (!confirm(`Remove block for ${domain}?`)) return;
  await fetch(`/api/blocks/${encodeURIComponent(domain)}`, { method:"DELETE" });
  renderBlocks();
}

// ─── check access ───────────────────────────────────────────────────────────
async function checkAccess() {
  const input = document.getElementById("testInput").value.trim();
  const toast = document.getElementById("toast");
  if (!input) { showToast("info", "Please enter a domain to check."); return; }
  const res  = await fetch(`/api/check?domain=${encodeURIComponent(input)}`);
  const data = await res.json();
  if (data.blocked) {
    showToast("blocked", `🚧 <strong>${data.domain}</strong> is currently <strong>blocked</strong> until <strong>${data.until}</strong>.`);
  } else if (data.reason === "Not in block list") {
    showToast("allowed", `✅ <strong>${data.domain}</strong> is <strong>not blocked</strong> — it's not in your block list.`);
  } else {
    showToast("info", `ℹ️ <strong>${data.domain}</strong> is scheduled (${data.window}) but <strong>not active</strong> right now.`);
  }
}

function showToast(type, html) {
  const toast = document.getElementById("toast");
  toast.className = "toast toast--" + (type === "blocked" ? "blocked" : type === "allowed" ? "allowed" : "info");
  toast.innerHTML = html;
  toast.style.display = "block";
  toast.style.animation = "none";
  void toast.offsetWidth; // reflow
  toast.style.animation = "fadeSlideIn .28s ease";
}

// ─── live refresh every 30s ─────────────────────────────────────────────────
renderBlocks();
setInterval(renderBlocks, 30000);
</script>
